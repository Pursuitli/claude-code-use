<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Love Island</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL@20..48,400..700,1" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; font-family:'Fredoka',sans-serif; background:#7ed6df; }
  #c { display:block; width:100%; height:100%; }
  .msr { font-family:'Material Symbols Rounded'; font-size:22px; line-height:1; vertical-align:middle; }
  .pill {
    background:rgba(255,255,255,.55); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border:1.5px solid rgba(255,255,255,.7); border-radius:999px;
    box-shadow:0 4px 20px rgba(40,80,120,.18); color:#37474f;
    display:flex; align-items:center; gap:8px; padding:10px 18px;
    font-weight:600; pointer-events:none;
  }
  #hud { position:fixed; inset:0; pointer-events:none; z-index:5; }
  #hearts { position:absolute; top:16px; left:16px; font-size:22px; }
  #hearts .msr { color:#ff4d6d; font-size:26px; }
  #timer { position:absolute; top:16px; left:50%; transform:translateX(-50%); font-size:26px; min-width:120px; justify-content:center; }
  #timer .msr { color:#5c7cfa; }
  #timer.urgent { color:#e03131; animation:pulse .5s infinite alternate; }
  @keyframes pulse { from{transform:translateX(-50%) scale(1);} to{transform:translateX(-50%) scale(1.07);} }
  #fuelWrap { position:absolute; top:14px; right:16px; width:92px; height:92px;
    background:rgba(255,255,255,.55); backdrop-filter:blur(12px); border:1.5px solid rgba(255,255,255,.7);
    border-radius:50%; box-shadow:0 4px 20px rgba(40,80,120,.18); }
  #fuelLamp { position:absolute; top:6px; right:112px; width:18px; height:18px; border-radius:50%;
    background:#cfd8dc; box-shadow:0 0 0 3px rgba(255,255,255,.6); display:none; }
  #fuelLamp.on { display:block; animation:blink .4s infinite alternate; }
  @keyframes blink { from{background:#e03131; box-shadow:0 0 14px #e03131;} to{background:#ffa8a8;} }
  #hint { position:absolute; bottom:18px; left:50%; transform:translateX(-50%); font-size:15px; }
  #hint b { color:#1971c2; }
  #fuelBanner { position:absolute; top:120px; left:50%; transform:translateX(-50%);
    background:rgba(224,49,49,.85); color:#fff; border:none; display:none; font-size:17px; }
  #fuelBanner.on { display:flex; animation:bannerpop .5s infinite alternate; }
  @keyframes bannerpop { from{opacity:.85;} to{opacity:1;} }
  #vignette { position:fixed; inset:0; pointer-events:none; z-index:4; opacity:0;
    background:radial-gradient(ellipse at center, transparent 55%, rgba(224,49,49,.55) 100%); transition:opacity .3s; }
  #vignette.on { animation:vig .8s infinite alternate; }
  @keyframes vig { from{opacity:.25;} to{opacity:.75;} }
  #refuelBar { position:absolute; bottom:90px; left:50%; transform:translateX(-50%); width:220px; height:18px;
    border-radius:999px; background:rgba(255,255,255,.55); border:1.5px solid rgba(255,255,255,.8);
    overflow:hidden; display:none; box-shadow:0 4px 20px rgba(40,80,120,.18); }
  #refuelFill { height:100%; width:0%; background:linear-gradient(90deg,#51cf66,#94d82d); border-radius:999px; }

  #card { position:absolute; top:50%; right:-340px; transform:translateY(-50%); width:300px;
    background:rgba(255,255,255,.75); backdrop-filter:blur(16px); border:2px solid rgba(255,255,255,.9);
    border-radius:28px; box-shadow:0 12px 40px rgba(40,80,120,.3); padding:16px; text-align:center;
    transition:right .45s cubic-bezier(.2,1.4,.4,1); }
  #card.show { right:20px; }
  #card img { width:100%; border-radius:20px; aspect-ratio:2/3; object-fit:cover; }
  #cardName { font-size:26px; font-weight:700; color:#37474f; margin-top:8px; }
  #cardPts { font-size:22px; font-weight:700; color:#ff4d6d; }
  #cardPts.rare { color:#f59f00; }

  .overlay { position:fixed; inset:0; z-index:10; display:flex; align-items:center; justify-content:center;
    background:rgba(126,214,223,.35); backdrop-filter:blur(8px); }
  .panel { background:rgba(255,255,255,.7); backdrop-filter:blur(20px); border:2px solid rgba(255,255,255,.9);
    border-radius:36px; box-shadow:0 20px 60px rgba(40,80,120,.35); padding:44px 56px; text-align:center;
    max-width:min(640px,92vw); max-height:90vh; overflow-y:auto; }
  .panel h1 { font-size:58px; font-weight:700; color:#ff4d6d; text-shadow:0 3px 0 rgba(255,255,255,.8); }
  .panel h1 .msr { font-size:50px; color:#ff4d6d; }
  .panel p { font-size:18px; color:#455a64; margin:14px 0 26px; font-weight:500; }
  .bigbtn { font-family:'Fredoka'; font-size:26px; font-weight:700; color:#fff; letter-spacing:1px;
    background:linear-gradient(180deg,#ff6b6b,#e03131); border:none; border-radius:999px; padding:16px 56px;
    cursor:pointer; box-shadow:0 8px 0 #b02525, 0 14px 30px rgba(224,49,49,.4); transition:transform .1s, box-shadow .1s; }
  .bigbtn:hover { transform:translateY(2px); box-shadow:0 6px 0 #b02525, 0 10px 24px rgba(224,49,49,.4); }
  .bigbtn:active { transform:translateY(6px); box-shadow:0 2px 0 #b02525; }
  #results { display:none; }
  #resHearts { font-size:40px; font-weight:700; color:#ff4d6d; }
  #resRank { font-size:28px; font-weight:700; color:#f59f00; margin:6px 0 16px; }
  #resGrid { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-bottom:24px; }
  #resGrid .gi { width:84px; text-align:center; }
  #resGrid img { width:84px; height:112px; object-fit:cover; border-radius:14px; border:2px solid #fff;
    box-shadow:0 4px 12px rgba(40,80,120,.25); }
  #resGrid .gi span { font-size:13px; font-weight:600; color:#546e7a; display:block; }
  #joy { position:fixed; bottom:30px; left:30px; width:130px; height:130px; border-radius:50%;
    background:rgba(255,255,255,.3); border:2px solid rgba(255,255,255,.6); display:none; z-index:6; touch-action:none; }
  #joyKnob { position:absolute; left:40px; top:40px; width:50px; height:50px; border-radius:50%;
    background:rgba(255,255,255,.8); box-shadow:0 4px 12px rgba(40,80,120,.3); }
  @media (pointer:coarse) { #joy{display:block;} #hint{display:none;} }
</style>
<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js" } }
</script>
</head>
<body>
<canvas id="c"></canvas>
<div id="vignette"></div>
<div id="hud">
  <div id="hearts" class="pill"><span class="msr">favorite</span><span id="heartCount">0</span></div>
  <div id="timer" class="pill"><span class="msr">timer</span><span id="timeLeft">60</span></div>
  <div id="fuelWrap"><canvas id="fuelCanvas" width="184" height="184" style="width:92px;height:92px;"></canvas></div>
  <div id="fuelLamp"></div>
  <div id="fuelBanner" class="pill"><span class="msr">local_gas_station</span>Low fuel — find the gas station!</div>
  <div id="refuelBar"><div id="refuelFill"></div></div>
  <div id="hint" class="pill"><b>W/S</b>: Throttle &amp; Brake&nbsp;&nbsp;<b>A/D</b>: Steer</div>
  <div id="card"><img id="cardImg" alt=""><div id="cardName"></div><div id="cardPts"></div></div>
</div>
<div id="joy"><div id="joyKnob"></div></div>

<div class="overlay" id="title">
  <div class="panel">
    <h1><span class="msr">favorite</span> Love Island</h1>
    <p>How many girls can you charm in 60 seconds?<br>Drive with <b>W / A / S / D</b> — and watch your fuel!</p>
    <button class="bigbtn" id="startBtn">START</button>
  </div>
</div>
<div class="overlay" id="results">
  <div class="panel">
    <h1>Time's Up!</h1>
    <div id="resHearts"></div>
    <div id="resRank"></div>
    <div id="resGrid"></div>
    <button class="bigbtn" id="againBtn">PLAY AGAIN</button>
  </div>
</div>

<script type="module">
import * as THREE from 'three';

/* ============ basics ============ */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9be7ef);
scene.fog = new THREE.Fog(0x9be7ef, 140, 320);
const camera = new THREE.PerspectiveCamera(55, 2, 0.1, 600);
function resize(){ const w=innerWidth,h=innerHeight; renderer.setSize(w,h,false); camera.aspect=w/h; camera.updateProjectionMatrix(); }
addEventListener('resize',resize); resize();

const sun = new THREE.DirectionalLight(0xfff4e0, 2.0);
sun.position.set(60,90,40); sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.left=-90; sun.shadow.camera.right=90; sun.shadow.camera.top=90; sun.shadow.camera.bottom=-90;
sun.shadow.camera.far=300;
scene.add(sun);
scene.add(new THREE.AmbientLight(0xbfdfff, 0.9));
scene.add(new THREE.HemisphereLight(0xcfefff, 0x88c9a1, 0.6));

const mat = (c,extra={}) => new THREE.MeshLambertMaterial({color:c,...extra});
function mesh(geo,m,x=0,y=0,z=0,cast=true){ const o=new THREE.Mesh(geo,m); o.position.set(x,y,z); o.castShadow=cast; o.receiveShadow=true; return o; }

/* ============ sea & island ============ */
const sea = mesh(new THREE.CircleGeometry(300,64), mat(0x35c4cf), 0,-0.35,0,false);
sea.rotation.x = -Math.PI/2; scene.add(sea);

const ISLAND_R = 62;
// sandy beach ring
const sand = mesh(new THREE.CylinderGeometry(ISLAND_R, ISLAND_R+4, 1.2, 48), mat(0xf6e3b0), 0,-0.6,0,false);
scene.add(sand);
// grassy interior
const grass = mesh(new THREE.CylinderGeometry(ISLAND_R-9, ISLAND_R-7, 1.0, 48), mat(0x8fd175), 0,-0.1,0,false);
scene.add(grass);
// foam ring
const foam = mesh(new THREE.RingGeometry(ISLAND_R+4, ISLAND_R+7.5, 64), new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.55}), 0,-0.3,0,false);
foam.rotation.x=-Math.PI/2; scene.add(foam);

/* palm islets */
function palmTree(s=1){
  const g = new THREE.Group();
  const trunk = mesh(new THREE.CylinderGeometry(.22*s,.34*s,3.4*s,6), mat(0xb08a5a), 0,1.7*s,0);
  trunk.rotation.z = .12;
  g.add(trunk);
  for(let i=0;i<6;i++){
    const leaf = mesh(new THREE.ConeGeometry(.5*s,2.6*s,4), mat(0x4caf6d), 0,3.4*s,0);
    leaf.rotation.z = Math.PI/2.4; leaf.rotation.y = i*Math.PI/3;
    leaf.geometry.translate(0,1.1*s,0);
    g.add(leaf);
  }
  return g;
}
for(const [x,z,r] of [[95,30,7],[-90,-55,6],[20,-105,8],[-100,60,5],[80,-80,6]]){
  const islet = mesh(new THREE.CylinderGeometry(r,r+2,1.4,16), mat(0xf6e3b0), x,-0.5,z,false);
  scene.add(islet);
  const f = mesh(new THREE.RingGeometry(r+2,r+4,32), new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:.5}), x,-0.29,z,false);
  f.rotation.x=-Math.PI/2; scene.add(f);
  const p = palmTree(1+Math.random()*.4); p.position.set(x+1,0,z-1); scene.add(p);
  if(r>6){ const p2=palmTree(.8); p2.position.set(x-2,0,z+2); p2.rotation.y=2; scene.add(p2); }
}

/* clouds */
const clouds = [];
for(let i=0;i<10;i++){
  const cl = new THREE.Group();
  const cm = new THREE.MeshLambertMaterial({color:0xffffff, transparent:true, opacity:.92});
  for(let j=0;j<4;j++) cl.add(mesh(new THREE.SphereGeometry(2.2+Math.random()*2.2, 7, 6), cm, j*3-4, Math.random()*1.2, Math.random()*2-1, false));
  cl.position.set((Math.random()-.5)*260, 36+Math.random()*16, (Math.random()-.5)*260);
  cl.userData.v = .8 + Math.random()*1.2;
  scene.add(cl); clouds.push(cl);
}

/* ============ town ============ */
const ROOFS = [0xff6b6b,0x5c7cfa,0xf59f00,0x40c057,0xcc5de8,0x22b8cf];
function house(x,z,rot,roofC,w=4,d=4,h=3){
  const g = new THREE.Group();
  g.add(mesh(new THREE.BoxGeometry(w,h,d), mat(0xfff4e0), 0,h/2,0));
  const roof = mesh(new THREE.ConeGeometry(Math.max(w,d)*0.78, h*0.8, 4), mat(roofC), 0,h+h*0.4,0);
  roof.rotation.y = Math.PI/4; g.add(roof);
  g.add(mesh(new THREE.BoxGeometry(w*0.25,h*0.45,.2), mat(0x795548), 0,h*0.22,d/2+0.05));
  g.add(mesh(new THREE.BoxGeometry(w*0.22,w*0.22,.12), mat(0xa5d8ff), w*0.25,h*0.6,d/2+0.05));
  g.position.set(x,0.4,z); g.rotation.y = rot;
  scene.add(g);
  return g;
}
const TOWN = {x:-8, z:-6};
const housePos = [[-22,-2,0.2],[-16,-16,1.2],[-2,-20,0],[8,-16,-.6],[-26,-12,1.6],[2,-2,3.1],[-10,4,0],[10,-4,-1.2]];
housePos.forEach(([x,z,r],i)=>house(x,z,r,ROOFS[i%ROOFS.length], 4+ (i%3), 4, 3+(i%2)));
// shop (bigger, awning)
const shop = house(-14,-9,0.1,0x22b8cf,6,5,3.5);
const awn = mesh(new THREE.BoxGeometry(5.6,.25,1.6), mat(0xff8787), 0,2.4,3.2); shop.add(awn);

/* roads */
const roadMat = mat(0xd9cfc0);
function road(x1,z1,x2,z2,w=3){
  const dx=x2-x1, dz=z2-z1, len=Math.hypot(dx,dz);
  const r = mesh(new THREE.BoxGeometry(len,0.15,w), roadMat, (x1+x2)/2, 0.42, (z1+z2)/2, false);
  r.rotation.y = -Math.atan2(dz,dx);
  scene.add(r);
}
road(-26,-9, 14,-9); road(-8,-22, -8,8); road(-8,8, 30,32); road(14,-9, 44,-9); road(-8,-22, -2,-44);

/* gas station */
const GAS = {x:6, z:-9};
const gasPad = mesh(new THREE.CylinderGeometry(3.4,3.4,.2,24), mat(0xffe066), GAS.x,0.5,GAS.z,false);
scene.add(gasPad);
const pump = new THREE.Group();
pump.add(mesh(new THREE.BoxGeometry(1,2,0.8), mat(0xe03131), 0,1,0));
pump.add(mesh(new THREE.BoxGeometry(.7,.5,.1), mat(0xffffff), 0,1.4,.42));
pump.position.set(GAS.x+2.6, .4, GAS.z); scene.add(pump);
const gasRoof = mesh(new THREE.BoxGeometry(7,.4,5), mat(0xff8787), GAS.x,4.4,GAS.z);
scene.add(gasRoof);
[[-3,-2],[3,-2],[-3,2],[3,2]].forEach(([dx,dz])=>scene.add(mesh(new THREE.CylinderGeometry(.18,.18,4,8), mat(0xeceff1), GAS.x+dx,2.4,GAS.z+dz)));
// gas marker (floating arrow)
const gasMarker = mesh(new THREE.ConeGeometry(1.2,2,4), new THREE.MeshBasicMaterial({color:0xe03131}), GAS.x, 8, GAS.z, false);
gasMarker.rotation.x = Math.PI; gasMarker.visible=false; scene.add(gasMarker);

/* trees & rocks */
function roundTree(x,z,s=1,c=0x57b563){
  const g=new THREE.Group();
  g.add(mesh(new THREE.CylinderGeometry(.25*s,.35*s,1.6*s,6), mat(0x9c6b3f), 0,.8*s,0));
  g.add(mesh(new THREE.SphereGeometry(1.5*s,8,7), mat(c), 0,2.4*s,0));
  g.add(mesh(new THREE.SphereGeometry(1.0*s,7,6), mat(c), .9*s,1.9*s,.3*s));
  g.position.set(x,.4,z); scene.add(g); return g;
}
const obstacles = []; // {x,z,r}
const treeColors=[0x57b563,0x6fcf72,0x3f9d5a,0x8bc34a];
for(let i=0;i<26;i++){
  const a=Math.random()*Math.PI*2, d=14+Math.random()*32;
  const x=Math.cos(a)*d, z=Math.sin(a)*d;
  if(Math.hypot(x-TOWN.x,z-TOWN.z)<20 || Math.hypot(x-GAS.x,z-GAS.z)<8) continue;
  const s=.8+Math.random()*.7;
  if(Math.random()<.7){ roundTree(x,z,s,treeColors[i%4]); obstacles.push({x,z,r:1.4*s}); }
  else { const p=palmTree(s); p.position.set(x,.4,z); p.rotation.y=Math.random()*6; scene.add(p); obstacles.push({x,z,r:.6}); }
}
for(let i=0;i<14;i++){
  const a=Math.random()*Math.PI*2, d=10+Math.random()*42;
  const x=Math.cos(a)*d, z=Math.sin(a)*d;
  if(Math.hypot(x-TOWN.x,z-TOWN.z)<18) continue;
  const s=.5+Math.random();
  const r=mesh(new THREE.DodecahedronGeometry(s,0), mat(0xb0bec5), x,.4+s*.3,z);
  r.rotation.set(Math.random(),Math.random(),Math.random()); scene.add(r);
  obstacles.push({x,z,r:s*.9});
}

/* lighthouse */
const LH = {x:34, z:36};
const lh = new THREE.Group();
for(let i=0;i<4;i++) lh.add(mesh(new THREE.CylinderGeometry(2.2-i*.35, 2.45-i*.35, 2.6, 14), mat(i%2?0xe03131:0xffffff), 0,1.3+i*2.6,0));
lh.add(mesh(new THREE.CylinderGeometry(1.1,1.1,1.6,10), mat(0x37474f), 0,11.2,0));
lh.add(mesh(new THREE.SphereGeometry(.9,10,8), new THREE.MeshBasicMaterial({color:0xfff3bf}), 0,11.2,0));
lh.add(mesh(new THREE.ConeGeometry(1.3,1.4,10), mat(0xe03131), 0,12.6,0));
lh.position.set(LH.x,.4,LH.z); scene.add(lh);
obstacles.push({x:LH.x,z:LH.z,r:2.8});
const beam = mesh(new THREE.ConeGeometry(3.5, 30, 16, 1, true),
  new THREE.MeshBasicMaterial({color:0xfff9c4, transparent:true, opacity:.28, side:THREE.DoubleSide, depthWrite:false}), 0,0,0,false);
beam.geometry.rotateZ(Math.PI/2); beam.geometry.translate(15,0,0);
beam.position.set(LH.x, 11.6, LH.z); scene.add(beam);

/* pier & boats */
const PIER = {x:-ISLAND_R+4, z:18, len:26};
const pierG = new THREE.Group();
const deck = mesh(new THREE.BoxGeometry(PIER.len, .5, 4), mat(0xb08a5a), -PIER.len/2, .7, 0);
pierG.add(deck);
for(let i=0;i<7;i++){ pierG.add(mesh(new THREE.CylinderGeometry(.2,.2,2.4,6), mat(0x8d6e4a), -i*4-2,-.3,1.7)); pierG.add(mesh(new THREE.CylinderGeometry(.2,.2,2.4,6), mat(0x8d6e4a), -i*4-2,-.3,-1.7)); }
pierG.position.set(PIER.x, 0, PIER.z); scene.add(pierG);
const boats=[];
function boat(x,z,c){
  const g=new THREE.Group();
  const hull = mesh(new THREE.CylinderGeometry(1.4,0.9,1.2,8), mat(c), 0,.3,0);
  hull.scale.set(1,.7,1.9); g.add(hull);
  g.add(mesh(new THREE.CylinderGeometry(.08,.08,2.6,6), mat(0xefebe9), 0,1.6,0));
  g.add(mesh(new THREE.BoxGeometry(.05,1.4,1.1), mat(0xffffff), .55,1.7,0));
  g.position.set(x,-.1,z); g.userData.p = Math.random()*6;
  scene.add(g); boats.push(g); return g;
}
boat(PIER.x-PIER.len-4, PIER.z+4, 0xff8787); boat(PIER.x-PIER.len-7, PIER.z-3, 0x74c0fc); boat(70,55,0xffd43b);

/* ============ scooter boy ============ */
const player = new THREE.Group();
{
  const body = new THREE.Group();
  // scooter
  body.add(mesh(new THREE.BoxGeometry(.5,.18,1.7), mat(0xe03131), 0,.45,0));           // deck
  body.add(mesh(new THREE.CylinderGeometry(.09,.09,.9,8), mat(0xe03131), 0,.95,.75));   // steering col
  body.children[1].rotation.x = -.35;
  body.add(mesh(new THREE.BoxGeometry(.8,.09,.09), mat(0x37474f), 0,1.4,.9));           // handlebar
  const wG = new THREE.CylinderGeometry(.28,.28,.18,12); wG.rotateZ(Math.PI/2);
  body.add(mesh(wG, mat(0x37474f), 0,.28,.8)); body.add(mesh(wG, mat(0x37474f), 0,.28,-.7));
  body.add(mesh(new THREE.BoxGeometry(.46,.4,.6), mat(0xffffff), 0,.62,-.55));          // rear fender/seatbox
  // boy
  const boy = new THREE.Group();
  boy.add(mesh(new THREE.BoxGeometry(.42,.55,.3), mat(0x4dabf7), 0,1.05,0));            // torso
  boy.add(mesh(new THREE.SphereGeometry(.27,10,9), mat(0xffd5b3), 0,1.55,0));           // head
  boy.add(mesh(new THREE.SphereGeometry(.285,10,6,0,Math.PI*2,0,1.2), mat(0x6d4c2f), 0,1.6,0)); // hair
  const legG = new THREE.BoxGeometry(.14,.5,.14);
  boy.add(mesh(legG, mat(0x37474f), .12,.6,.05)); boy.add(mesh(legG, mat(0x37474f), -.12,.6,.05));
  const armG = new THREE.BoxGeometry(.11,.45,.11);
  const aL = mesh(armG, mat(0x4dabf7), .26,1.15,.25); aL.rotation.x=-1.1; boy.add(aL);
  const aR = mesh(armG, mat(0x4dabf7), -.26,1.15,.25); aR.rotation.x=-1.1; boy.add(aR);
  boy.position.z = -.15;
  body.add(boy);
  body.rotation.y = Math.PI; // face -z? we drive along +forward computed below
  player.add(body);
}
scene.add(player);

/* exhaust puffs */
const puffs=[]; const puffGeo=new THREE.SphereGeometry(.18,6,5);
function spawnPuff(){
  const m=new THREE.MeshBasicMaterial({color:0xeeeeee,transparent:true,opacity:.7});
  const p=new THREE.Mesh(puffGeo,m);
  const back = new THREE.Vector3(Math.sin(car.heading), 0, Math.cos(car.heading));
  p.position.copy(player.position).addScaledVector(back, 1.0); p.position.y=.5;
  p.userData={life:0}; scene.add(p); puffs.push(p);
}

/* heart particles */
const heartsFx=[];
function heartShapeGeo(){
  const s=new THREE.Shape();
  s.moveTo(0,.25); s.bezierCurveTo(0,.45,-.35,.5,-.35,.2); s.bezierCurveTo(-.35,0,0,-.05,0,-.3);
  s.bezierCurveTo(0,-.05,.35,0,.35,.2); s.bezierCurveTo(.35,.5,0,.45,0,.25);
  return new THREE.ExtrudeGeometry(s,{depth:.08,bevelEnabled:false});
}
const heartGeo = heartShapeGeo();
function heartBurst(pos, gold){
  for(let i=0;i<14;i++){
    const m=new THREE.Mesh(heartGeo, new THREE.MeshBasicMaterial({color: gold?0xffd43b:0xff4d6d, transparent:true}));
    m.position.copy(pos); m.scale.setScalar(.6+Math.random()*.6);
    m.userData={v:new THREE.Vector3((Math.random()-.5)*8, 4+Math.random()*5, (Math.random()-.5)*8), life:0};
    scene.add(m); heartsFx.push(m);
  }
}

/* ============ girls ============ */
const GIRL_DEFS = [
  {name:'Mei',  img:'assets/girls/mei.png'},  {name:'Yuna', img:'assets/girls/yuna.png'},
  {name:'Sora', img:'assets/girls/sora.png'}, {name:'Lin',  img:'assets/girls/lin.png'},
  {name:'Hana', img:'assets/girls/hana.png'}, {name:'Aiko', img:'assets/girls/aiko.png'},
  {name:'Rin',  img:'assets/girls/rin.png'},  {name:'Mika', img:'assets/girls/mika.png'},
  {name:'Yui',  img:'assets/girls/yui.png'},  {name:'Nana', img:'assets/girls/nana.png'},
];
const HAIR=[0x4a3326,0x2b2118,0x6d4c2f,0x8d5524,0x1a1a1a];
const DRESS=[0xff8fab,0xa5d8ff,0xffe066,0xb2f2bb,0xe5b8f4,0xffc9a3,0xffffff,0x99e9f2];
function girlMesh(hair,dress,gold){
  const g=new THREE.Group();
  const dressM = gold? new THREE.MeshLambertMaterial({color:0xffd43b, emissive:0xaa8800}) : mat(dress);
  g.add(mesh(new THREE.ConeGeometry(.42,.85,10), dressM, 0,.85,0));               // dress
  g.add(mesh(new THREE.SphereGeometry(.26,10,9), mat(0xffd9bd), 0,1.5,0));        // head
  g.add(mesh(new THREE.SphereGeometry(.28,10,7,0,Math.PI*2,0,1.5), mat(hair), 0,1.56,0)); // hair
  g.add(mesh(new THREE.SphereGeometry(.13,8,6), mat(hair), .22,1.25,0));          // side hair / tail
  const armG=new THREE.CylinderGeometry(.05,.05,.4,6);
  const a1=mesh(armG, mat(0xffd9bd), .3,1.05,0); a1.rotation.z=-.6; g.add(a1);
  const a2=mesh(armG, mat(0xffd9bd), -.3,1.05,0); a2.rotation.z=.6; g.add(a2);
  // heart sparkle at feet
  const h=new THREE.Mesh(heartGeo, new THREE.MeshBasicMaterial({color: gold?0xffd43b:0xff4d6d}));
  h.scale.setScalar(.9); h.position.y=.15; h.rotation.x=-Math.PI/2; h.name='spark'; g.add(h);
  if(gold){
    const glow=new THREE.Mesh(new THREE.CylinderGeometry(.8,.8,.05,16), new THREE.MeshBasicMaterial({color:0xffe066,transparent:true,opacity:.5}));
    glow.position.y=.1; g.add(glow);
  }
  return g;
}
// spawn spots: beach ring, town, lighthouse, pier
const girlSpots = [];
for(let i=0;i<10;i++){ const a=i/10*Math.PI*2+.3; girlSpots.push([Math.cos(a)*(ISLAND_R-4), Math.sin(a)*(ISLAND_R-4)]); }    // beach
[[-20,-6],[-5,-14],[3,-6],[-12,0],[12,-12],[-24,-16]].forEach(p=>girlSpots.push(p));                                          // town
[[LH.x-5,LH.z-2],[LH.x+3,LH.z+5],[28,28]].forEach(p=>girlSpots.push(p));                                                       // lighthouse
[[20,15],[-30,30],[15,-30],[40,5]].forEach(p=>girlSpots.push(p));                                                              // grass misc
const rareSpots = [
  [PIER.x-PIER.len+1.5, PIER.z],          // end of pier
  [LH.x+4.5, LH.z+4.5],                   // behind lighthouse
  [Math.cos(2.4)*(ISLAND_R-2.5), Math.sin(2.4)*(ISLAND_R-2.5)], // far beach edge
  [-2,-44+4],                             // end of south road, near shore
];
let girls=[];
function spawnGirls(){
  girls.forEach(g=>scene.remove(g.obj)); girls=[];
  const all=[...girlSpots.map(p=>({p,rare:false})), ...rareSpots.map(p=>({p,rare:true}))];
  all.forEach((s,i)=>{
    const def = GIRL_DEFS[i % GIRL_DEFS.length];
    const obj = girlMesh(HAIR[i%HAIR.length], DRESS[i%DRESS.length], s.rare);
    obj.position.set(s.p[0], s.rare && i>=girlSpots.length && Math.hypot(s.p[0]-(PIER.x-PIER.len+1.5),s.p[1]-PIER.z)<1 ? .95 : .4, s.p[1]);
    obj.userData.phase = Math.random()*6;
    scene.add(obj);
    girls.push({obj, def, rare:s.rare, collected:false});
  });
}

/* ============ audio ============ */
let AC=null, engineOsc=null, engineGain=null, engineFilter=null, lastBeep=0;
function audioInit(){
  if(AC) return;
  AC = new (window.AudioContext||window.webkitAudioContext)();
  engineOsc = AC.createOscillator(); engineOsc.type='sawtooth'; engineOsc.frequency.value=50;
  engineFilter = AC.createBiquadFilter(); engineFilter.type='lowpass'; engineFilter.frequency.value=300;
  engineGain = AC.createGain(); engineGain.gain.value=0;
  engineOsc.connect(engineFilter).connect(engineGain).connect(AC.destination);
  engineOsc.start();
}
function tone(f, t0, dur, type='sine', vol=.25){
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type; o.frequency.value=f;
  g.gain.setValueAtTime(vol, AC.currentTime+t0);
  g.gain.exponentialRampToValueAtTime(.001, AC.currentTime+t0+dur);
  o.connect(g).connect(AC.destination);
  o.start(AC.currentTime+t0); o.stop(AC.currentTime+t0+dur+.05);
}
const sfx = {
  pickup(rare){ if(!AC)return; const base=rare?880:660; [0,.08,.16].forEach((t,i)=>tone(base*Math.pow(1.25,i), t, .25, 'triangle', .3)); if(rare) tone(1760,.24,.4,'triangle',.3); },
  beep(){ if(!AC)return; tone(220,0,.15,'square',.15); },
  jingle(){ if(!AC)return; [523,659,784,1047,784,1047].forEach((f,i)=>tone(f, i*.13, .3, 'triangle', .28)); },
};

/* ============ game state ============ */
const car = {x:0, z:20, heading:Math.PI, speed:0, steer:0};
let hearts=0, timeLeft=60, fuel=1, playing=false, refuelT=0, collectedList=[];
const keys={};
addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

/* touch joystick */
const joy=document.getElementById('joy'), knob=document.getElementById('joyKnob');
let joyVec={x:0,y:0};
joy.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
joy.addEventListener('touchmove',e=>{
  e.preventDefault();
  const r=joy.getBoundingClientRect(), t=e.touches[0];
  let dx=(t.clientX-r.left-65)/50, dy=(t.clientY-r.top-65)/50;
  const m=Math.hypot(dx,dy); if(m>1){dx/=m;dy/=m;}
  joyVec={x:dx,y:dy};
  knob.style.left=(40+dx*40)+'px'; knob.style.top=(40+dy*40)+'px';
},{passive:false});
joy.addEventListener('touchend',()=>{ joyVec={x:0,y:0}; knob.style.left='40px'; knob.style.top='40px'; });

/* HUD */
const $=id=>document.getElementById(id);
const fuelCtx = $('fuelCanvas').getContext('2d');
function drawFuel(){
  const ctx=fuelCtx, W=184, cx=92, cy=100;
  ctx.clearRect(0,0,W,W);
  ctx.lineWidth=12; ctx.lineCap='round';
  // arc background
  ctx.strokeStyle='rgba(120,144,156,.3)';
  ctx.beginPath(); ctx.arc(cx,cy,58, Math.PI*0.8, Math.PI*2.2); ctx.stroke();
  // colored arc
  const grad=fuel>.25?'#40c057':'#e03131';
  ctx.strokeStyle=grad;
  ctx.beginPath(); ctx.arc(cx,cy,58, Math.PI*0.8, Math.PI*(0.8+1.4*fuel)); ctx.stroke();
  // needle
  const ang = Math.PI*(0.8+1.4*fuel);
  ctx.strokeStyle='#37474f'; ctx.lineWidth=5;
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(ang)*48, cy+Math.sin(ang)*48); ctx.stroke();
  ctx.fillStyle='#37474f'; ctx.beginPath(); ctx.arc(cx,cy,8,0,7); ctx.fill();
  // icon
  ctx.font='26px Material Symbols Rounded'; ctx.fillStyle=fuel>.25?'#37474f':'#e03131';
  ctx.textAlign='center'; ctx.fillText('local_gas_station', cx, cy+42);
}

let cardTimer=null;
function showCard(def, rare){
  $('cardImg').src=def.img; $('cardName').textContent=def.name;
  $('cardPts').textContent = rare? '+5 ❤' : '+1 ❤';
  $('cardPts').className = rare? 'rare':'';
  $('card').classList.add('show');
  clearTimeout(cardTimer);
  cardTimer=setTimeout(()=>$('card').classList.remove('show'), 2000);
}

/* ============ start/reset/end ============ */
function reset(){
  hearts=0; timeLeft=60; fuel=1; collectedList=[]; refuelT=0;
  Object.assign(car,{x:0,z:20,heading:Math.PI,speed:0,steer:0});
  $('heartCount').textContent='0'; $('timeLeft').textContent='60';
  $('timer').classList.remove('urgent');
  $('card').classList.remove('show');
  spawnGirls();
}
$('startBtn').onclick=()=>{ audioInit(); AC.resume(); reset(); $('title').style.display='none'; playing=true; };
$('againBtn').onclick=()=>{ reset(); $('results').style.display='none'; playing=true; };

const RANKS=[[0,'Lonely Heart'],[5,'Charmer'],[12,'Smooth Operator'],[20,'Heartbreaker!']];
function endGame(){
  playing=false; sfx.jingle();
  $('resHearts').innerHTML = `❤ ${hearts} heart${hearts===1?'':'s'}`;
  let rank=RANKS[0][1]; for(const [n,r] of RANKS) if(hearts>=n) rank=r;
  $('resRank').textContent = rank;
  const grid=$('resGrid'); grid.innerHTML='';
  const seen=new Map();
  collectedList.forEach(g=>seen.set(g.def.name,(seen.get(g.def.name)||0)+1));
  for(const [name,count] of seen){
    const def=GIRL_DEFS.find(d=>d.name===name);
    const div=document.createElement('div'); div.className='gi';
    div.innerHTML=`<img src="${def.img}" alt="${name}"><span>${name}${count>1?' ×'+count:''}</span>`;
    grid.appendChild(div);
  }
  if(seen.size===0) grid.innerHTML='<p style="margin:0">No girls charmed… try again!</p>';
  $('results').style.display='flex';
  $('vignette').classList.remove('on'); $('fuelBanner').classList.remove('on');
  $('fuelLamp').classList.remove('on'); gasMarker.visible=false;
}

/* ============ main loop ============ */
const clock=new THREE.Clock();
let puffAcc=0, timerAcc=0;
spawnGirls();

function isOnPier(x,z){
  // pier runs from island edge outward along -x
  return z>PIER.z-2.2 && z<PIER.z+2.2 && x<PIER.x+1 && x>PIER.x-PIER.len-1;
}

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(), .05);
  const t=clock.elapsedTime;

  /* input */
  let throttle=0, steer=0;
  if(playing){
    if(keys['w']||keys['arrowup']) throttle=1;
    if(keys['s']||keys['arrowdown']) throttle=-1;
    if(keys['a']||keys['arrowleft']) steer=1;
    if(keys['d']||keys['arrowright']) steer=-1;
    if(Math.abs(joyVec.y)>.15) throttle=-joyVec.y;
    if(Math.abs(joyVec.x)>.15) steer=-joyVec.x;
  }

  /* physics */
  const MAXS = fuel>0 ? 16 : 3.5;
  if(throttle>0 && fuel>0){ car.speed += 18*dt*throttle; fuel=Math.max(0,fuel-.028*dt*throttle); }
  else if(throttle>0){ car.speed += 5*dt*throttle; }
  else if(throttle<0) car.speed += 22*dt*throttle;
  car.speed -= car.speed*1.1*dt;             // drag
  car.speed = Math.max(-5, Math.min(MAXS, car.speed));
  car.steer += (steer-car.steer)*8*dt;
  car.heading += car.steer * 1.9 * dt * Math.min(1, Math.abs(car.speed)/4) * Math.sign(car.speed||1);
  let nx = car.x + Math.sin(car.heading)*-car.speed*dt;
  let nz = car.z + Math.cos(car.heading)*-car.speed*dt;

  /* bounds: island circle or pier */
  const d=Math.hypot(nx,nz);
  if(d > ISLAND_R+2 && !isOnPier(nx,nz)){
    const k=(ISLAND_R+2)/d;
    if(!isOnPier(car.x,car.z)){ nx*=k; nz*=k; car.speed*=.4; }
    else { // on pier: clamp to pier rect
      nz=Math.max(PIER.z-1.8,Math.min(PIER.z+1.8,nz));
      nx=Math.max(PIER.x-PIER.len-0.5,Math.min(nx,PIER.x+1));
      car.speed*=.6;
    }
  }
  /* obstacle collisions */
  for(const o of obstacles){
    const dx=nx-o.x, dz=nz-o.z, dist=Math.hypot(dx,dz);
    if(dist < o.r+.7){ const push=(o.r+.7-dist); nx+=dx/dist*push; nz+=dz/dist*push; car.speed*=.5; }
  }
  car.x=nx; car.z=nz;
  player.position.set(car.x, isOnPier(car.x,car.z)&&Math.hypot(car.x,car.z)>ISLAND_R-2 ? .55 : 0, car.z);
  player.rotation.y = car.heading;
  player.rotation.z = car.steer * -.12 * Math.min(1,Math.abs(car.speed)/8);

  /* camera follow */
  const camTarget = new THREE.Vector3(
    car.x + Math.sin(car.heading)*11,
    9.5,
    car.z + Math.cos(car.heading)*11
  );
  camera.position.lerp(camTarget, 1-Math.pow(.001,dt));
  camera.lookAt(car.x, 1.2, car.z);

  /* girls bob/rotate & collect */
  for(const g of girls){
    if(g.collected) continue;
    g.obj.rotation.y = t*1.6 + g.obj.userData.phase;
    g.obj.position.y = (g.obj.userData.baseY ?? (g.obj.userData.baseY=g.obj.position.y)) + Math.sin(t*2.4+g.obj.userData.phase)*.18;
    const sp=g.obj.getObjectByName('spark');
    if(sp) sp.rotation.z = t*3;
    if(playing && Math.hypot(car.x-g.obj.position.x, car.z-g.obj.position.z) < 1.5){
      g.collected=true; scene.remove(g.obj);
      const pts = g.rare?5:1; hearts+=pts;
      $('heartCount').textContent=hearts;
      collectedList.push(g);
      heartBurst(g.obj.position, g.rare);
      sfx.pickup(g.rare);
      showCard(g.def, g.rare);
    }
  }

  /* fuel HUD & low fuel */
  drawFuel();
  const low = fuel<.25;
  $('fuelLamp').classList.toggle('on', low&&playing);
  $('fuelBanner').classList.toggle('on', low&&playing);
  $('vignette').classList.toggle('on', low&&playing);
  gasMarker.visible = low&&playing;
  gasMarker.position.y = 7.5+Math.sin(t*4)*.8; gasMarker.rotation.y=t*2;
  if(low && playing && AC && t-lastBeep>1){ sfx.beep(); lastBeep=t; }

  /* refuel */
  const onPad = Math.hypot(car.x-GAS.x, car.z-GAS.z)<3.4 && Math.abs(car.speed)<.8;
  if(playing && onPad && fuel<1){
    refuelT+=dt; fuel=Math.min(1, fuel+dt/2);
    $('refuelBar').style.display='block';
    $('refuelFill').style.width=(fuel*100)+'%';
  } else { refuelT=0; $('refuelBar').style.display='none'; }

  /* engine sound */
  if(AC && engineGain){
    const sp=Math.abs(car.speed)/16;
    engineGain.gain.setTargetAtTime(playing? .03+sp*.06 : 0, AC.currentTime, .1);
    engineOsc.frequency.setTargetAtTime(45+sp*120+ (throttle>0?15:0), AC.currentTime, .08);
    engineFilter.frequency.setTargetAtTime(250+sp*900, AC.currentTime, .1);
  }

  /* exhaust puffs */
  puffAcc+=dt;
  if(playing && throttle>0 && fuel>0 && puffAcc>.12){ puffAcc=0; spawnPuff(); }
  for(let i=puffs.length-1;i>=0;i--){
    const p=puffs[i]; p.userData.life+=dt;
    p.position.y+=dt*1.5; p.scale.addScalar(dt*1.8);
    p.material.opacity=.7-p.userData.life*1.2;
    if(p.userData.life>.6){ scene.remove(p); p.material.dispose(); puffs.splice(i,1); }
  }
  /* heart fx */
  for(let i=heartsFx.length-1;i>=0;i--){
    const h=heartsFx[i]; h.userData.life+=dt;
    h.userData.v.y-=12*dt;
    h.position.addScaledVector(h.userData.v,dt);
    h.rotation.y+=dt*6;
    h.material.opacity=1-h.userData.life;
    if(h.userData.life>1){ scene.remove(h); h.material.dispose(); heartsFx.splice(i,1); }
  }

  /* world idle anims */
  beam.rotation.y = t*.9;
  for(const b of boats){ b.position.y=-.1+Math.sin(t*1.3+b.userData.p)*.15; b.rotation.z=Math.sin(t+b.userData.p)*.06; }
  for(const cl of clouds){ cl.position.x+=cl.userData.v*dt; if(cl.position.x>150) cl.position.x=-150; }
  foam.scale.setScalar(1+Math.sin(t*1.2)*.012);

  /* timer */
  if(playing){
    timerAcc+=dt;
    if(timerAcc>=1){
      timerAcc-=1; timeLeft--;
      $('timeLeft').textContent=Math.max(0,timeLeft);
      $('timer').classList.toggle('urgent', timeLeft<=10);
      if(timeLeft<=0) endGame();
    }
  }

  renderer.render(scene,camera);
}
camera.position.set(0,30,45);
window.__game = { car, girls:()=>girls, hearts:()=>hearts, end:()=>{ if(playing) endGame(); }, fuel:v=>{fuel=v;} };
animate();
</script>
